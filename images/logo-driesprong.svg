    <!-- Seat -->
    <path d="M28 15 L26 10"/>
  </g>
  
  <!-- Text: De Driesprong -->
  <text x="120" y="55" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1a1a2e">
    De Driesprong
  </text>
  
  <!-- Text: Fietsverhuur -->
  <text x="120" y="85" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#388e3c">
