  <circle cx="60" cy="60" r="50" fill="#388e3c" opacity="0.1"/>
  
  <!-- Bike icon -->
  <g transform="translate(25, 35)" fill="none" stroke="#388e3c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wheels -->
    <circle cx="15" cy="35" r="12"/>
    <circle cx="55" cy="35" r="12"/>
    <!-- Frame -->
    <path d="M15 35 L30 15 L50 15 L35 35"/>
    <path d="M30 15 L25 35"/>
    <path d="M35 35 L50 15"/>
    <!-- Handlebars -->
