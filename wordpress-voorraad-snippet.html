<!-- Bus vol Bikes Voorraad - WordPress Snippet -->
<!-- Plak dit in een Custom HTML blok in WordPress -->

<style>
/* Bus vol Bikes - Voorraad Styling */
.bvb-voorraad {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* Stats bovenaan */
.bvb-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding: 16px 20px;
    background: #f8fafc;
    border-radius: 8px;
    font-size: 14px;
    color: #64748b;
    flex-wrap: wrap;
    gap: 10px;
}

.bvb-stats .update-time {
    font-size: 12px;
}

/* Filter buttons */
.bvb-filters {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

.bvb-filter-btn {
    padding: 10px 20px;
    border: 2px solid #e2e8f0;
    background: white;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    color: #0f172a;
}

.bvb-filter-btn:hover {
    border-color: #22c55e;
    color: #22c55e;
}

.bvb-filter-btn.active {
    background: #22c55e;
    border-color: #22c55e;
    color: white;
}

/* Grid layout */
.bvb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    margin-bottom: 48px;
}

/* Fiets kaart */
.bvb-fiets-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    border: 1px solid #e2e8f0;
}

.bvb-fiets-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
}

.bvb-fiets-image {
    width: 100%;
    height: 220px;
    background: #f8fafc;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

.bvb-fiets-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: transform 0.3s;
}

.bvb-fiets-card:hover .bvb-fiets-image img {
    transform: scale(1.05);
}

.bvb-fiets-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #22c55e;
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    z-index: 1;
}

.bvb-fiets-badge.nieuw {
    background: #3b82f6;
}

.bvb-fiets-content {
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
}

.bvb-fiets-title {
    font-size: 17px;
    font-weight: 700;
    color: #0f172a;
    margin: 0 0 8px 0;
    line-height: 1.3;
}

.bvb-fiets-details {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 12px;
    line-height: 1.5;
}

.bvb-fiets-specs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
}

.bvb-fiets-spec {
    background: #f1f5f9;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: #475569;
}

.bvb-fiets-footer {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid #e2e8f0;
}

.bvb-fiets-prijs {
    font-size: 22px;
    font-weight: 800;
    color: #22c55e;
}

.bvb-fiets-link {
    padding: 10px 20px;
    background: #0f172a;
    color: white !important;
    border-radius: 8px;
    text-decoration: none !important;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.2s;
}

.bvb-fiets-link:hover {
    background: #1e293b;
    color: white !important;
}

/* Loading & Error states */
.bvb-loading, .bvb-error {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
    font-size: 16px;
}

.bvb-error {
    color: #ef4444;
}

.bvb-error a {
    color: #22c55e;
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
    .bvb-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
    }
    
    .bvb-fiets-image {
        height: 180px;
    }
    
    .bvb-filters {
        justify-content: center;
    }
    
    .bvb-filter-btn {
        padding: 8px 16px;
        font-size: 13px;
    }
    
    .bvb-stats {
        flex-direction: column;
        text-align: center;
        gap: 8px;
    }
}

@media (max-width: 480px) {
    .bvb-grid {
        grid-template-columns: 1fr;
    }
    
    .bvb-fiets-prijs {
        font-size: 20px;
    }
}
</style>

<div class="bvb-voorraad">
    <!-- Stats -->
    <div class="bvb-stats">
        <span id="bvb-fietsen-count">Fietsen laden...</span>
        <span class="update-time" id="bvb-update-time"></span>
    </div>
    
    <!-- Filters -->
    <div class="bvb-filters">
        <button class="bvb-filter-btn active" data-filter="all">Alle fietsen</button>
        <button class="bvb-filter-btn" data-filter="gebruikt">Gebruikt</button>
        <button class="bvb-filter-btn" data-filter="nieuw">Nieuw</button>
    </div>
    
    <!-- Grid -->
    <div class="bvb-grid" id="bvb-fietsen-grid">
        <div class="bvb-loading">🚲 Fietsen worden geladen...</div>
    </div>
</div>

<script>
// Bus vol Bikes - Voorraad Script voor WordPress
(function() {
    // Configuratie - pas dit aan als de URL verandert
    const DATA_URL = 'https://busvolbikes-website-production.up.railway.app/fietsen-data.json';
    
    let alleFietsen = [];
    let huidigeFilter = 'all';
    
    // Laad fietsen data
    async function laadFietsen() {
        const grid = document.getElementById('bvb-fietsen-grid');
        const countEl = document.getElementById('bvb-fietsen-count');
        const updateEl = document.getElementById('bvb-update-time');
        
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error('Data niet gevonden');
            
            const data = await response.json();
            alleFietsen = data.fietsen || [];
            
            // Update stats
            countEl.textContent = alleFietsen.length + ' fietsen beschikbaar';
            if (data.laatsteUpdate) {
                const date = new Date(data.laatsteUpdate);
                updateEl.textContent = 'Laatste update: ' + date.toLocaleDateString('nl-NL', { 
                    day: 'numeric', 
                    month: 'short', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
            }
            
            // Toon fietsen
            toonFietsen();
            
        } catch (error) {
            console.error('Fout bij laden fietsen:', error);
            grid.innerHTML = `
                <div class="bvb-error">
                    <p>❌ Fietsen konden niet worden geladen.</p>
                    <p><a href="https://d40972d3c78b4bc6a44e816ede6281cc.hst.fietsenwijk.nl/fietsen/" target="_blank">
                        Bekijk voorraad direct op Fietsenwijk →
                    </a></p>
                </div>
            `;
            countEl.textContent = 'Fout bij laden';
        }
    }
    
    // Toon fietsen met filter
    function toonFietsen() {
        const grid = document.getElementById('bvb-fietsen-grid');
        
        // Filter fietsen
        let gefilterdeFietsen = alleFietsen;
        if (huidigeFilter === 'gebruikt') {
            gefilterdeFietsen = alleFietsen.filter(function(f) {
                return (f.soort && f.soort.toLowerCase().includes('gebruik')) || 
                       (f.titel && f.titel.toLowerCase().includes('gebruik'));
            });
        } else if (huidigeFilter === 'nieuw') {
            gefilterdeFietsen = alleFietsen.filter(function(f) {
                return (f.soort && f.soort.toLowerCase().includes('nieuw')) || 
                       (f.titel && f.titel.toLowerCase().includes('nieuw'));
            });
        }
        
        if (gefilterdeFietsen.length === 0) {
            grid.innerHTML = '<div class="bvb-loading">Geen fietsen gevonden met dit filter.</div>';
            return;
        }
        
        // Genereer HTML
        grid.innerHTML = gefilterdeFietsen.map(createFietsCard).join('');
    }
    
    // Maak fiets kaart HTML
    function createFietsCard(fiets) {
        const isNieuw = (fiets.soort && fiets.soort.toLowerCase().includes('nieuw')) || 
                        (fiets.titel && fiets.titel.toLowerCase().includes('nieuw'));
        const badgeClass = isNieuw ? 'bvb-fiets-badge nieuw' : 'bvb-fiets-badge';
        const badgeText = isNieuw ? 'Nieuw' : 'Gebruikt';
        
        const details = [
            fiets.geslacht,
            fiets.maat,
            fiets.kleur
        ].filter(function(x) { return x; }).join(' • ');
        
        const specs = [];
        if (fiets.modeljaar) specs.push('Bouwjaar: ' + fiets.modeljaar);
        if (fiets.wielmaat) specs.push('Wielmaat: ' + fiets.wielmaat);
        
        let specsHtml = '';
        if (specs.length > 0) {
            specsHtml = '<div class="bvb-fiets-specs">' + 
                specs.map(function(s) { return '<span class="bvb-fiets-spec">' + s + '</span>'; }).join('') + 
                '</div>';
        }
        
        return `
            <article class="bvb-fiets-card">
                <div class="bvb-fiets-image">
                    <span class="${badgeClass}">${badgeText}</span>
                    <img src="${fiets.foto}" 
                         alt="${fiets.titel}" 
                         loading="lazy"
                         onerror="this.style.display='none'">
                </div>
                <div class="bvb-fiets-content">
                    <h3 class="bvb-fiets-title">${fiets.titel}</h3>
                    <p class="bvb-fiets-details">${details}</p>
                    ${specsHtml}
                    <div class="bvb-fiets-footer">
                        <span class="bvb-fiets-prijs">${fiets.prijs}</span>
                        <a href="${fiets.detailUrl}" target="_blank" class="bvb-fiets-link">
                            Bekijken →
                        </a>
                    </div>
                </div>
            </article>
        `;
    }
    
    // Initialiseer wanneer DOM geladen is
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
    function init() {
        // Laad fietsen
        laadFietsen();
        
        // Filter buttons
        document.querySelectorAll('.bvb-filter-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                // Update active state
                document.querySelectorAll('.bvb-filter-btn').forEach(function(b) {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                
                // Update filter en toon
                huidigeFilter = btn.dataset.filter;
                toonFietsen();
            });
        });
    }
})();
</script>
